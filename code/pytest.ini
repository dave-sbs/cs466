[pytest]
testpaths = tests
addopts = -q
markers =
    ffmpeg: integration tests that invoke the ffmpeg or ffprobe binary
    gpu: tests that require a CUDA-capable GPU and heavy models (SDXL, RIFE)
    slow: tests that take more than a few seconds to run
    integration: cross-module integration tests (may touch disk heavily)
    network: tests that require network access (HuggingFace, OpenRouter, etc.)
    colab_manual: only runnable in a Colab environment with Drive mounted
